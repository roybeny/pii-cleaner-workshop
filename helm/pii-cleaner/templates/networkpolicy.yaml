{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pii-cleaner.fullname" . }}
  labels:
    {{- include "pii-cleaner.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pii-cleaner.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFromNamespaces }}
      from:
        {{- range . }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      {{- end }}
{{- end }}
