{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pii-cleaner.fullname" . }}
  labels:
    {{- include "pii-cleaner.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "pii-cleaner.selectorLabels" . | nindent 6 }}
{{- end }}
