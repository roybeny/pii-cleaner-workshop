image:
  repository: pii-cleaner
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

service:
  type: ClusterIP
  port: 8000

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  # Narrow to specific namespaces/pods in real deployments.
  ingressFromNamespaces: []

# Mounted into /etc/pii-cleaner/tenants.yaml (use `helm install --set-file tenants=...`).
tenants: ""

# HMAC key for tamper-evident audit log.
auditHmacKey: ""

env:
  PII_LOG_LEVEL: INFO
  PII_DEFAULT_RPS: "100"
  PII_DEFAULT_BURST: "200"
  PII_TENANTS_FILE: /etc/pii-cleaner/tenants.yaml
  PII_AUDIT_HMAC_KEY_FILE: /etc/pii-cleaner/audit.key

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""

prometheus:
  # Annotations for Prometheus scrape (pod-scrape style).
  enabled: true
